<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orders — Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/admin.css">
</head>

<body data-admin-page="orders">
    <div class="admin-mobile-header">
        <button id="toggle-admin-sidebar" class="toggle-sidebar">☰</button>
        <span style="font-weight:700">Orders</span><span></span>
    </div>
    <div class="admin-layout">
        <aside class="admin-sidebar" id="admin-sidebar">
            <div class="brand">
                <h2><span>ZILLA</span> Admin</h2><small>Store Management</small>
            </div>
            <nav>
                <a href="/admin/dashboard"><span class="icon">📊</span> Dashboard</a>
                <a href="/admin/products"><span class="icon">📦</span> Products</a>
                <a href="/admin/categories"><span class="icon">🏷️</span> Categories</a>
                <a href="/admin/offers"><span class="icon">🎫</span> Offers</a>
                <a href="/admin/orders" class="active"><span class="icon">🛒</span> Orders</a>
                <a href="/admin/users"><span class="icon">👥</span> Users</a>
                <a href="/admin/settings"><span class="icon">⚙️</span> Settings</a>
            </nav>
            <button class="logout-btn" id="admin-logout">Sign Out</button>
        </aside>

        <main class="admin-main">
            <h1>Orders</h1>
            <p class="subtitle">View and manage customer orders</p>

            <div class="admin-table-search" style="margin-bottom:20px;display:flex;gap:10px">
                <input type="text" id="order-search" placeholder="Search orders (name, email)..."
                    style="flex:1;padding:10px;border-radius:6px;border:1px solid var(--border)">
                <button class="btn btn-primary" onclick="searchOrders()">Search</button>
            </div>

            <div class="admin-table-wrap">
                <div class="admin-table-header">
                    <h3>All Orders</h3>
                </div>
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th onclick="sortOrders('id')">ID ↕</th>
                            <th onclick="sortOrders('customer_name')">Customer ↕</th>
                            <th>Email</th>
                            <th>Address</th>
                            <th onclick="sortOrders('total')">Total ↕</th>
                            <th onclick="sortOrders('status')">Status ↕</th>
                            <th onclick="sortOrders('created_at')">Date ↕</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="orders-list">
                        <tr>
                            <td colspan="9" class="text-center text-light" style="padding:24px">Loading...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/app.js"></script>
    <script src="/js/admin.js"></script>
    <script>
        let currentSort = 'created_at';
        let currentDir = 'DESC';
        function sortOrders(col) {
            if (currentSort === col) {
                currentDir = currentDir === 'DESC' ? 'ASC' : 'DESC';
            } else {
                currentSort = col; currentDir = 'DESC';
            }
            loadAdminOrders(currentSort, currentDir);
        }
    </script>
</body>

</html>
