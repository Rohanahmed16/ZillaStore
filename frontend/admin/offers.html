<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offers — Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/admin.css">
</head>

<body data-admin-page="offers">
    <div class="admin-mobile-header">
        <button id="toggle-admin-sidebar" class="toggle-sidebar">☰</button>
        <span style="font-weight:700">Offers</span><span></span>
    </div>
    <div class="admin-layout">
        <aside class="admin-sidebar" id="admin-sidebar">
            <div class="brand">
                <h2><span>ZILLA</span> Admin</h2><small>Store Management</small>
            </div>
            <nav>
                <a href="/admin/dashboard"><span class="icon">📊</span> Dashboard</a>
                <a href="/admin/products"><span class="icon">📦</span> Products</a>
                <a href="/admin/categories"><span class="icon">🏷️</span> Categories</a>
                <a href="/admin/offers" class="active"><span class="icon">🎫</span> Offers</a>
                <a href="/admin/orders"><span class="icon">🛒</span> Orders</a>
                <a href="/admin/users"><span class="icon">👥</span> Users</a>
                <a href="/admin/settings"><span class="icon">⚙️</span> Settings</a>
            </nav>
            <button class="logout-btn" id="admin-logout">Sign Out</button>
        </aside>

        <main class="admin-main">
            <h1>Offers & Discounts</h1>
            <p class="subtitle">Create and manage promotional offers</p>

            <div class="admin-form mb-32">
                <h3 id="offer-form-title" style="margin-bottom:20px">Add New Offer</h3>
                <form id="offer-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="offer-name">Offer Name</label>
                            <input type="text" id="offer-name" placeholder="e.g. Spring Sale" required>
                        </div>
                        <div class="form-group">
                            <label for="offer-type">Discount Type</label>
                            <select id="offer-type" required>
                                <option value="percentage">Percentage (%)</option>
                                <option value="fixed">Fixed Amount ($)</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="offer-value">Value</label>
                            <input type="number" id="offer-value" step="0.01" min="0" placeholder="15" required>
                        </div>
                        <div class="form-group">
                            <label>Active</label>
                            <div class="toggle-wrap"><button type="button" class="toggle active"
                                    id="offer-active"></button><span>Currently active</span></div>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="offer-start">Start Date</label>
                            <input type="date" id="offer-start" required>
                        </div>
                        <div class="form-group">
                            <label for="offer-end">End Date</label>
                            <input type="date" id="offer-end" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="offer-scope">Apply To</label>
                        <select id="offer-scope">
                            <option value="">All Products (no specific scope)</option>
                            <option value="product">Specific Product</option>
                            <option value="category">Specific Category</option>
                            <option value="section">Entire Section</option>
                        </select>
                    </div>
                    <div class="form-group" id="offer-product-wrap" style="display:none">
                        <label for="offer-product">Product</label>
                        <select id="offer-product">
                            <option value="">Select Product</option>
                        </select>
                    </div>
                    <div class="form-group" id="offer-category-wrap" style="display:none">
                        <label for="offer-category">Category</label>
                        <select id="offer-category">
                            <option value="">Select Category</option>
                        </select>
                    </div>
                    <div class="form-group" id="offer-section-wrap" style="display:none">
                        <label for="offer-section-select">Section</label>
                        <select id="offer-section-select">
                            <option value="">Select Section</option>
                        </select>
                    </div>
                    <div style="display:flex;gap:12px;margin-top:8px">
                        <button type="submit" class="btn btn-primary">Save Offer</button>
                        <button type="button" class="btn btn-outline" id="cancel-offer">Cancel</button>
                    </div>
                </form>
            </div>

            <div class="admin-table-wrap">
                <div class="admin-table-header">
                    <h3>All Offers</h3>
                </div>
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Discount</th>
                            <th>Start</th>
                            <th>End</th>
                            <th>Scope</th>
                            <th>Active</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="offers-list">
                        <tr>
                            <td colspan="7" class="text-center text-light" style="padding:24px">Loading...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/app.js"></script>
    <script src="/js/admin.js"></script>
</body>

</html>
