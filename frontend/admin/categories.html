<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Categories — Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/admin.css">
</head>

<body data-admin-page="categories">
    <div class="admin-mobile-header">
        <button id="toggle-admin-sidebar" class="toggle-sidebar">☰</button>
        <span style="font-weight:700">Categories</span><span></span>
    </div>
    <div class="admin-layout">
        <aside class="admin-sidebar" id="admin-sidebar">
            <div class="brand">
                <h2><span>ZILLA</span> Admin</h2><small>Store Management</small>
            </div>
            <nav>
                <a href="/admin/dashboard"><span class="icon">📊</span> Dashboard</a>
                <a href="/admin/products"><span class="icon">📦</span> Products</a>
                <a href="/admin/categories" class="active"><span class="icon">🏷️</span> Categories</a>
                <a href="/admin/offers"><span class="icon">🎫</span> Offers</a>
                <a href="/admin/orders"><span class="icon">🛒</span> Orders</a>
                <a href="/admin/users"><span class="icon">👥</span> Users</a>
                <a href="/admin/settings"><span class="icon">⚙️</span> Settings</a>
            </nav>
            <button class="logout-btn" id="admin-logout">Sign Out</button>
        </aside>

        <main class="admin-main">
            <h1>Categories</h1>
            <p class="subtitle">Manage top-level categories and subcategories</p>

            <div class="admin-form mb-24"
                style="background:var(--bg); border:1px solid #eaeaea; border-radius:8px; padding:24px;">
                <form id="add-section-form" style="display:flex;gap:12px;align-items:flex-end">
                    <div class="form-group" style="flex:1;margin:0">
                        <label for="new-section-name">Add New Category</label>
                        <input type="text" id="new-section-name" placeholder="e.g. Footwear" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-sm" style="height:42px">Add</button>
                </form>
            </div>

            <div id="dynamic-categories-container">
                <!-- Dynamically populated by JS -->
                <p class="text-light">Loading categories...</p>
            </div>
        </main>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/app.js"></script>
    <script src="/js/admin.js"></script>
</body>

</html>
