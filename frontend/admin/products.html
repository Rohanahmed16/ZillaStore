<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products — Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/admin.css">
</head>

<body data-admin-page="products">
    <div class="admin-mobile-header">
        <button id="toggle-admin-sidebar" class="toggle-sidebar">☰</button>
        <span style="font-weight:700">Products</span><span></span>
    </div>
    <div class="admin-layout">
        <aside class="admin-sidebar" id="admin-sidebar">
            <div class="brand">
                <h2><span>ZILLA</span> Admin</h2><small>Store Management</small>
            </div>
            <nav>
                <a href="/admin/dashboard"><span class="icon">📊</span> Dashboard</a>
                <a href="/admin/products" class="active"><span class="icon">📦</span> Products</a>
                <a href="/admin/categories"><span class="icon">🏷️</span> Categories</a>
                <a href="/admin/offers"><span class="icon">🎫</span> Offers</a>
                <a href="/admin/orders"><span class="icon">🛒</span> Orders</a>
                <a href="/admin/users"><span class="icon">👥</span> Users</a>
                <a href="/admin/settings"><span class="icon">⚙️</span> Settings</a>
            </nav>
            <button class="logout-btn" id="admin-logout">Sign Out</button>
        </aside>

        <main class="admin-main">
            <h1>Products</h1>
            <p class="subtitle">Manage your product catalog</p>

            <!-- Product Form -->
            <div class="admin-form mb-32">
                <h3 id="product-form-title" style="margin-bottom:20px">Add New Product</h3>
                <form id="product-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="prod-name">Product Name</label>
                            <input type="text" id="prod-name" placeholder="e.g. Classic Leather Tote" required>
                        </div>
                        <div class="form-group">
                            <label for="prod-price">Price ($)</label>
                            <input type="number" id="prod-price" step="0.01" min="0" placeholder="89.99" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="prod-desc">Description</label>
                        <textarea id="prod-desc" placeholder="Product description..."></textarea>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="prod-section">Section</label>
                            <select id="prod-section" required>
                                <option value="">Select Section</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="prod-subcat">Subcategory</label>
                            <select id="prod-subcat">
                                <option value="">Select Subcategory</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="prod-stock">Stock Quantity</label>
                            <input type="number" id="prod-stock" min="0" value="0">
                        </div>
                        <div class="form-group">
                            <label for="prod-image">Product Image</label>
                            <input type="file" id="prod-image" accept="image/*">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Active</label>
                            <div class="toggle-wrap"><button type="button" class="toggle active"
                                    id="prod-active"></button><span>Visible on store</span></div>
                        </div>
                        <div class="form-group">
                            <label>Featured</label>
                            <div class="toggle-wrap"><button type="button" class="toggle"
                                    id="prod-featured"></button><span>Show on homepage</span></div>
                        </div>
                    </div>
                    <div style="display:flex;gap:12px;margin-top:8px">
                        <button type="submit" class="btn btn-primary">Save Product</button>
                        <button type="button" class="btn btn-outline" id="cancel-product">Cancel</button>
                    </div>
                </form>
            </div>

            <!-- Products Table -->
            <div class="admin-table-wrap">
                <div class="admin-table-header">
                    <h3>All Products</h3>
                </div>
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>Product</th>
                            <th>Section</th>
                            <th>Category</th>
                            <th>Price</th>
                            <th>Stock</th>
                            <th>Active</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="admin-products-list">
                        <tr>
                            <td colspan="7" class="text-center text-light" style="padding:24px">Loading...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/app.js"></script>
    <script src="/js/admin.js"></script>
</body>

</html>
