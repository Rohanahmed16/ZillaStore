<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout — ZILLA Store</title>
    <meta name="description" content="Complete your order">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <header class="site-header" id="site-header"></header>

    <div class="page-banner">
        <div class="container">
            <h1>Checkout</h1>
        </div>
    </div>

    <div class="container">
        <div class="checkout-layout">
            <!-- Left: Customer info form -->
            <form id="checkout-form">
                <h2 class="mb-24" style="font-size:1.25rem">Delivery Information</h2>
                <div class="form-group">
                    <label for="customer_name">Full Name</label>
                    <input type="text" id="customer_name" placeholder="John Doe" required>
                    <div class="error-msg">Please enter your full name (min 2 characters)</div>
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="john@example.com" required>
                    <div class="error-msg">Please enter a valid email address</div>
                </div>
                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" placeholder="+1 (555) 000-0000" required>
                    <div class="error-msg">Please enter a valid phone number</div>
                </div>
                <div class="form-group">
                    <label for="address">Delivery Address</label>
                    <textarea id="address" placeholder="123 Main St, City, State, ZIP" required></textarea>
                    <div class="error-msg">Please enter your full delivery address (min 5 characters)</div>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Place Order</button>
            </form>

            <!-- Right: Order summary -->
            <div class="order-summary-card" id="checkout-summary">
                <div class="skeleton" style="height:200px"></div>
            </div>
        </div>
    </div>

    <footer class="site-footer" id="site-footer"></footer>

    <script src="/js/api.js"></script>
    <script src="/js/app.js"></script>
    <script src="/js/checkout.js"></script>
</body>

</html>
