<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suits — ZILLA Store</title>
    <meta name="description"
        content="Explore our premium collection of suits — formal, casual, wedding suits and blazers">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>

<body data-section="suits">
    <header class="site-header" id="site-header"></header>

    <div class="page-banner">
        <div class="container">
            <h1>Suits Collection</h1>
            <p>Formal suits, casual suits, wedding suits & blazers</p>
        </div>
    </div>

    <div class="container">
        <button class="btn btn-outline btn-sm filter-toggle mt-24" id="filter-toggle">☰ Filters</button>
        <div class="shop-layout">
            <aside class="sidebar" id="sidebar"></aside>
            <main>
                <div class="product-grid" id="product-grid"></div>
            </main>
        </div>
    </div>

    <footer class="site-footer" id="site-footer"></footer>

    <script src="/js/api.js"></script>
    <script src="/js/app.js"></script>
    <script src="/js/products.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const wait = setInterval(() => {
                if (!siteSettings) return; clearInterval(wait);
                updateSEO({ title: 'Suits Collection', description: 'Explore premium suits at ' + (siteSettings.store_name || 'ZILLA Store') });
            }, 100);
        });
    </script>
</body>

</html>
