<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Confirmed — ZILLA Store</title>
    <meta name="description" content="Your order has been placed successfully">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <header class="site-header" id="site-header"></header>

    <section class="confirmation" style="padding:100px 24px">
        <div class="check-icon">✓</div>
        <h1>Thank You!</h1>
        <p class="order-id" id="order-id">Your order has been placed.</p>
        <p class="text-light mb-32">We'll send a confirmation email with your order details shortly.</p>
        <a href="/products" class="btn btn-primary">Continue Shopping</a>
    </section>

    <footer class="site-footer" id="site-footer"></footer>

    <script src="/js/api.js"></script>
    <script src="/js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const pathParts = window.location.pathname.split('/');
            const orderId = pathParts[pathParts.length - 1];
            if (orderId) {
                document.getElementById('order-id').textContent = `Order #${orderId} has been placed successfully!`;
            }
        });
    </script>
</body>

</html>
